version: 2.1

# Packs src/ into orb.yml on every push, validates it, publishes a dev
# version per branch, and promotes to a semver release when a tag like
# `v1.2.3` is pushed.
#
# Requires three env vars on the orb project's CircleCI:
#   CIRCLE_TOKEN        — CircleCI personal token with orb-publish scope
#   ORB_PUBLISHING      — set to "true" to actually publish (else dry-run)
# The namespace `hexsign` must be registered separately (one-time):
#   circleci namespace create hexsign github hexsign

orbs:
  orb-tools: circleci/orb-tools@12.4.0

filters: &filters
  tags:
    only: /.*/

release-filters: &release-filters
  branches:
    ignore: /.*/
  tags:
    only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

workflows:
  lint-pack:
    jobs:
      - orb-tools/lint:
          filters: *filters
      - orb-tools/pack:
          filters: *filters
      - orb-tools/review:
          filters: *filters
      - orb-tools/publish:
          orb_name: hexsign/hexsign
          vcs_type: github
          pub_type: dev
          enable_pr_comment: false
          requires:
            - orb-tools/lint
            - orb-tools/pack
            - orb-tools/review
          context: orb-publishing
          filters: *filters

  release:
    jobs:
      - orb-tools/pack:
          filters: *release-filters
      - orb-tools/publish:
          orb_name: hexsign/hexsign
          vcs_type: github
          pub_type: production
          requires:
            - orb-tools/pack
          context: orb-publishing
          filters: *release-filters
